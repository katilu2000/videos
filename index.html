<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Videos</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h2 {
  cursor: pointer;
  margin: 10px 0;
  color: #00ffcc;
}

video {
  display: none;
  margin-bottom: 20px;
  max-width: 90%;
}
</style>
</head>
<body>

<h1>Mis Videos</h1>

<!-- Video 1 -->
<h2 onclick="mostrarVideo('video1')">Es su historia real</h2>
<video id="video1" controls>
  <source src="Es su historia real.mp4" type="video/mp4">
  Tu navegador no soporta video.
</video>

<!-- Video 2 -->
<h2 onclick="mostrarVideo('video2')">Bajo el cielo azul profundo</h2>
<video id="video2" controls>
  <source src="Bajo el cielo azul profundo.mp4" type="video/mp4">
  Tu navegador no soporta video.
</video>

<!-- Video 3 -->
<h2 onclick="mostrarVideo('video3')">Huaynius (Instrumental)</h2>
<video id="video3" controls>
  <source src="Huaynius (Instrumental).mp4" type="video/mp4">
  Tu navegador no soporta video.
</video>

<!-- Video 4 -->
<h2 onclick="mostrarVideo('video4')">Tiempo de amor eterno</h2>
<video id="video4" controls>
  <source src="Tiempo de amor eterno.mp4" type="video/mp4">
  Tu navegador no soporta video.
</video>

<!-- Video 5 -->
<h2 onclick="mostrarVideo('video5')">Gitana (Instrumental)</h2>
<video id="video5" controls>
  <source src="Gitana (Instrumental).mp4" type="video/mp4">
  Tu navegador no soporta video.
</video>

<script>
function mostrarVideo(id) {
  // Ocultar todos los videos
  const videos = document.querySelectorAll('video');
  videos.forEach(v => v.style.display = 'none');

  // Mostrar solo el seleccionado
  const v = document.getElementById(id);
  v.style.display = 'block';
  v.scrollIntoView({behavior: "smooth"});
}
</script>

</body>
</html>
